<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessible Interactive Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #222;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        #image {
            width: 650px;
            max-width: 90%;
            height: 400px;
            margin: 25px auto;
            border: 4px solid #222;
            background-color: #ffffff;
            background-image: url('');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-top: 20px;
        }

        figure {
            margin: 0;
            padding: 10px;
            background-color: #ffffff;
            border: 2px solid #777;
            border-radius: 8px;
            width: 180px;
            cursor: pointer;
        }

        figure:focus {
            outline: 4px solid #005fcc;
            border-color: #005fcc;
        }

        figure:hover {
            border-color: #000;
            transform: scale(1.03);
        }

        figure img {
            width: 160px;
            height: 110px;
            object-fit: cover;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }

        figcaption {
            margin-top: 8px;
            font-size: 15px;
        }
    </style>
</head>

<body onload="addTabFocus()">

    <h1>Accessible Interactive Photo Gallery</h1>

    <p>Hover over an image or use the keyboard Tab key to display it here.</p>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <main class="gallery">
        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1015/300/200" alt="Beautiful mountain landscape with clouds">
            <figcaption>Mountain</figcaption>
        </figure>

        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1011/300/200" alt="Peaceful forest path with green trees">
            <figcaption>Forest</figcaption>
        </figure>

        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1016/300/200" alt="Blue ocean waves near a rocky coast">
            <figcaption>Ocean</figcaption>
        </figure>

        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1025/300/200" alt="Cute dog sitting outside">
            <figcaption>Dog</figcaption>
        </figure>

        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1035/300/200" alt="River flowing between green hills">
            <figcaption>River</figcaption>
        </figure>

        <figure onmouseover="upDate(this)" onmouseleave="undo()" onfocus="upDate(this)" onblur="undo()">
            <img src="https://picsum.photos/id/1043/300/200" alt="City buildings under a bright sky">
            <figcaption>City</figcaption>
        </figure>
    </main>

    <script>
        function upDate(previewPic) {
            console.log("Event triggered: upDate function is running.");

            let imageElement = previewPic.querySelector("img");
            let imageAlt = imageElement.alt;
            let imageSrc = imageElement.src;

            console.log("Alt text: " + imageAlt);
            console.log("Image source: " + imageSrc);

            document.getElementById("image").innerHTML = imageAlt;
            document.getElementById("image").style.backgroundImage =
                "url('" + imageSrc + "')";
        }

        function undo() {
            console.log("Event triggered: undo function is running.");

            document.getElementById("image").style.backgroundImage = "url('')";
            document.getElementById("image").innerHTML =
                "Hover over an image below to display here.";
        }

        function addTabFocus() {
            console.log("Page loaded. Adding tabindex attributes.");

            let figures = document.querySelectorAll("figure");

            for (let i = 0; i < figures.length; i++) {
                figures[i].setAttribute("tabindex", "0");
                console.log("tabindex added to figure " + i);
            }
        }
    </script>

</body>
</html>
